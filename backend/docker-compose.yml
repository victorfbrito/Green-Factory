version: "3.9"

services:
  db:
    image: postgres:16
    container_name: duofactory-postgres
    environment:
      POSTGRES_DB: duofactory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - duofactory_postgres_data:/var/lib/postgresql/data

volumes:
  duofactory_postgres_data: